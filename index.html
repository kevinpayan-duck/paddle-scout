<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paddle Scout</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0284c7">
  <style>
    :root {
      --bg-color: #121212;
      --card-bg: #1e1e1e;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --status-green: #10b981;
      --status-yellow: #f59e0b;
      --status-red: #ef4444;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      margin: 0;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    h1 { font-size: 1.4rem; margin: 4px 0; color: #0284c7; }
    .card {
      background-color: var(--card-bg);
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
    }
    #stoplight-banner {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: bold;
      font-size: 1.2rem;
      border-left: 6px solid var(--text-muted);
      padding-left: 10px;
    }
    .weather-metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
      font-size: 0.9rem;
    }
    .metric { color: var(--text-muted); }
    .metric span { color: var(--text-main); font-weight: 500; }
    #advice-box {
      margin-top: 10px;
      font-size: 0.95rem;
      line-height: 1.4;
    }
    .map-container {
      flex-grow: 1;
      height: calc(100vh - 240px);
      min-height: 400px;
      border-radius: 12px;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    button {
      background-color: #0284c7;
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <h1>Paddle Scout</h1>
      <button onclick="initiateLocationCheck()">Refresh Context</button>
    </div>
    
    <div id="stoplight-banner" style="margin-top: 12px;">Locating device...</div>
    
    <div class="weather-metrics">
      <div class="metric">Wind: <span id="wind-speed">--</span></div>
      <div class="metric">Gusts: <span id="wind-gust">--</span></div>
    </div>
    <div id="advice-box" class="metric">Waiting for weather updates to generate route criteria...</div>
  </div>

  <div class="map-container">
    <iframe src="https://paddling.com/embed/locations/" allow="geolocation"></iframe>
  </div>

  <script src="app.js?v=2"></script>
</body>
</html>
